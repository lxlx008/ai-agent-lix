<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 私人助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-red-50">
    <div class="flex h-screen">
        <!-- 左侧会话列表 -->
        <div class="w-80 bg-white/80 backdrop-blur-sm border-r border-white/50 flex flex-col">
            <!-- 头部 -->
            <div class="p-4 border-b border-gray-100">
                <div class="flex items-center justify-between">
                    <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">AI 私人助手</h1>
                    <button id="new-chat-btn" class="p-2 bg-orange-500 hover:bg-orange-600 text-white rounded-lg transition-colors" title="新建会话">
                        <span class="material-icons text-sm">add</span>
                    </button>
                </div>
            </div>
            
            <!-- 会话列表 -->
            <div id="threads-list" class="flex-1 overflow-y-auto p-2 scrollbar-hide">
                <!-- 会话项将通过JS动态添加 -->
            </div>
        </div>

        <!-- 右侧聊天区域 -->
        <div class="flex-1 flex flex-col">
            <!-- 聊天头部 -->
            <div id="chat-header" class="h-16 bg-white/80 backdrop-blur-sm border-b border-white/50 px-6 flex items-center justify-between">
                <div>
                    <h2 id="current-thread-title" class="font-semibold text-gray-800">新对话</h2>
                    <p class="text-sm text-gray-500">开始新的对话</p>
                </div>
                <button id="clear-chat-btn" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="清空会话">
                    <span class="material-icons text-sm">delete</span>
                </button>
            </div>

            <!-- 消息区域 -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-4 scrollbar-hide">
                <!-- 欢迎消息 -->
                <div class="flex justify-center py-8">
                    <div class="text-center max-w-md">
                        <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center">
                            <span class="material-icons text-white text-3xl">smart_toy</span>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-800 mb-2">你好呀！我是你的 AI 私人助手</h3>
                        <p class="text-gray-600">很高兴为你服务！请问有什么我可以帮助你的吗？</p>
                        <div class="mt-4 text-left bg-blue-50 rounded-xl p-4">
                            <p class="text-sm text-gray-700 mb-2"><span class="font-semibold">💡 我可以帮你解答问题、提供建议</span></p>
                            <p class="text-sm text-gray-600 mb-2"><span class="font-semibold">🔍 搜索最新信息和资讯</span></p>
                            <p class="text-sm text-gray-600 mb-2"><span class="font-semibold">📝 提供创意和灵感</span></p>
                            <p class="text-sm text-gray-600"><span class="font-semibold">💬 陪你聊天交流</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="p-4 bg-white/80 backdrop-blur-sm border-t border-white/50">
                <div class="max-w-3xl mx-auto flex items-end gap-3">
                    <button id="upload-btn" class="p-3 text-gray-400 hover:text-orange-500 hover:bg-orange-50 rounded-xl transition-colors" title="上传图片">
                        <span class="material-icons text-lg">attach_file</span>
                    </button>
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                    <div class="flex-1 relative">
                        <input 
                            id="message-input" 
                            type="text" 
                            placeholder="有什么我可以帮助你的吗？..." 
                            class="w-full px-4 py-3 pr-12 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent resize-none"
                        >
                    </div>
                    <button id="send-btn" disabled class="p-3 bg-orange-500 hover:bg-orange-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white rounded-xl transition-colors" title="发送">
                        <span class="material-icons text-lg">send</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 当前会话 ID
        let currentThreadId = null;
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const threadsList = document.getElementById('threads-list');
        const currentThreadTitle = document.getElementById('current-thread-title');
        const newChatBtn = document.getElementById('new-chat-btn');
        const clearChatBtn = document.getElementById('clear-chat-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');

        // 生成随机会话 ID
        function generateThreadId() {
            return 'thread_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // 创建新会话
        function createNewThread() {
            currentThreadId = generateThreadId();
            currentThreadTitle.textContent = '新对话';
            messagesContainer.innerHTML = `
                <div class="flex justify-center py-8">
                    <div class="text-center max-w-md">
                        <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-br from-orange-500 to-red-500 rounded-2xl flex items-center justify-center">
                            <span class="material-icons text-white text-3xl">restaurant</span>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-800 mb-2">你好呀！我是你的 AI 私厨管家</h3>
                        <p class="text-gray-600">很高兴为你服务！请告诉我你有什么食材...</p>
                    </div>
                </div>
            `;
            messageInput.value = '';
            sendBtn.disabled = true;
            loadThreads();
        }

        // 加载会话列表
        async function loadThreads() {
            try {
                const response = await fetch('/api/v1/chat/threads');
                const data = await response.json();
                renderThreads(data.threads);
            } catch (error) {
                console.error('加载会话列表失败:', error);
            }
        }

        // 渲染会话列表
        function renderThreads(threads) {
            threadsList.innerHTML = '';
            
            // 添加新对话按钮
            const newThreadItem = document.createElement('div');
            newThreadItem.className = 'p-3 mb-2 bg-orange-50 hover:bg-orange-100 rounded-xl cursor-pointer transition-colors flex items-center gap-3';
            newThreadItem.innerHTML = `
                <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-red-500 rounded-lg flex items-center justify-center">
                    <span class="material-icons text-white text-sm">add</span>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="font-medium text-gray-800 truncate">新对话</p>
                    <p class="text-xs text-gray-500">开始新的会话</p>
                </div>
            `;
            newThreadItem.addEventListener('click', createNewThread);
            threadsList.appendChild(newThreadItem);

            // 添加分割线
            const divider = document.createElement('div');
            divider.className = 'h-px bg-gray-200 my-2';
            threadsList.appendChild(divider);

            // 添加历史会话
            threads.forEach(thread => {
                const threadItem = document.createElement('div');
                threadItem.className = `p-3 mb-2 rounded-xl cursor-pointer transition-colors flex items-center gap-3 ${currentThreadId === thread.thread_id ? 'bg-orange-100 border-2 border-orange-300' : 'bg-gray-50 hover:bg-gray-100'}`;
                threadItem.innerHTML = `
                    <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-orange-500 rounded-lg flex items-center justify-center">
                        <span class="material-icons text-white text-sm">message</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-medium text-gray-800 truncate">${thread.title}</p>
                        <p class="text-xs text-gray-500">${formatDate(thread.created_at)}</p>
                    </div>
                    <button class="delete-thread-btn p-1 text-gray-400 hover:text-red-500 transition-colors" data-thread-id="${thread.thread_id}" title="删除会话">
                        <span class="material-icons text-xs">delete</span>
                    </button>
                `;
                threadItem.addEventListener('click', () => switchThread(thread.thread_id, thread.title));
                threadsList.appendChild(threadItem);
            });

            // 添加删除会话事件
            document.querySelectorAll('.delete-thread-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const threadId = btn.dataset.threadId;
                    deleteThread(threadId);
                });
            });
        }

        // 切换会话
        async function switchThread(threadId, title) {
            currentThreadId = threadId;
            currentThreadTitle.textContent = title;
            
            // 加载历史消息
            try {
                const response = await fetch(`/api/v1/chat/messages?thread_id=${threadId}`);
                const data = await response.json();
                messagesContainer.innerHTML = '';
                data.messages.forEach(msg => {
                    addMessage(msg.role, msg.content);
                });
            } catch (error) {
                console.error('加载历史消息失败:', error);
            }
            
            // 更新选中状态
            document.querySelectorAll('#threads-list > div').forEach(item => {
                item.classList.remove('bg-orange-100', 'border-2', 'border-orange-300');
                item.classList.add('bg-gray-50');
            });
            loadThreads();
        }

        // 删除会话
        async function deleteThread(threadId) {
            if (!confirm('确定要删除这个会话吗？')) return;
            
            try {
                await fetch(`/api/v1/chat/messages?thread_id=${threadId}`, {
                    method: 'DELETE'
                });
                
                // 如果删除的是当前会话，创建新会话
                if (currentThreadId === threadId) {
                    createNewThread();
                } else {
                    loadThreads();
                }
            } catch (error) {
                console.error('删除会话失败:', error);
            }
        }

        // 格式化日期
        function formatDate(dateString) {
            if (!dateString) return '未知';
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;
            return date.toLocaleDateString('zh-CN');
        }

        // 添加消息
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex gap-3 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            messageDiv.innerHTML = `
                <div class="w-10 h-10 flex-shrink-0 rounded-xl flex items-center justify-center ${
                    role === 'user' 
                        ? 'bg-gradient-to-br from-blue-500 to-indigo-600' 
                        : 'bg-gradient-to-br from-blue-500 to-indigo-600'
                }">
                    <span class="material-icons text-white text-sm">${role === 'user' ? 'person' : 'smart_toy'}</span>
                </div>
                <div class="max-w-[70%]">
                    <div class="px-4 py-3 rounded-2xl ${
                        role === 'user' 
                            ? 'bg-blue-500 text-white rounded-br-md' 
                            : 'bg-white text-gray-800 rounded-bl-md shadow-sm'
                    }">
                        <p class="whitespace-pre-wrap">${escapeHtml(content)}</p>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !currentThreadId) return;

            // 添加用户消息
            addMessage('user', message);
            
            // 清空输入
            messageInput.value = '';
            sendBtn.disabled = true;

            // 创建 AI 回复容器
            const aiMessageContainer = document.createElement('div');
            aiMessageContainer.className = 'flex gap-3';
            aiMessageContainer.innerHTML = `
                <div class="w-10 h-10 flex-shrink-0 rounded-xl flex items-center justify-center bg-gradient-to-br from-blue-500 to-indigo-600">
                    <span class="material-icons text-white text-sm">smart_toy</span>
                </div>
                <div class="max-w-[70%]">
                    <div class="px-4 py-3 rounded-2xl bg-white text-gray-800 rounded-bl-md shadow-sm">
                        <p id="ai-response" class="whitespace-pre-wrap"></p>
                        <div id="loading-indicator" class="flex gap-1 mt-2">
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
                        </div>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(aiMessageContainer);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            const aiResponseElement = document.getElementById('ai-response');
            const loadingIndicator = document.getElementById('loading-indicator');

            try {
                const response = await fetch('/api/v1/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        image_url: '',
                        thread_id: currentThreadId
                    })
                });

                if (!response.ok) {
                    throw new Error('请求失败');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let responseText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    responseText += decoder.decode(value, { stream: true });
                    aiResponseElement.textContent = responseText;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }

                // 移除加载指示器
                loadingIndicator.remove();
                
                // 更新会话列表标题
                loadThreads();
            } catch (error) {
                console.error('发送消息失败:', error);
                aiResponseElement.textContent = '抱歉，发生了错误，请重试。';
                loadingIndicator.remove();
            }
        }

        // 事件监听
        messageInput.addEventListener('input', () => {
            sendBtn.disabled = !messageInput.value.trim();
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        newChatBtn.addEventListener('click', createNewThread);
        clearChatBtn.addEventListener('click', () => {
            if (currentThreadId) {
                deleteThread(currentThreadId);
            }
        });

        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 创建初始会话
            if (!currentThreadId) {
                createNewThread();
            }
        });
    </script>
</body>
</html>
