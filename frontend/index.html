<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 私人助手</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧会话列表 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="app-title">AI 私人助手</h1>
                <button id="new-chat-btn" class="btn btn-primary" title="新建会话">
                    <span class="material-icons">add</span>
                </button>
            </div>
            <div id="threads-list" class="threads-list">
                <!-- 会话项将通过 JS 动态添加 -->
            </div>
        </aside>

        <!-- 右侧聊天区域 -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-title">
                    <h2 id="current-thread-title">新对话</h2>
                    <p class="chat-subtitle">开始新的对话</p>
                </div>
                <button id="clear-chat-btn" class="btn btn-icon" title="清空会话">
                    <span class="material-icons">delete</span>
                </button>
            </header>

            <div id="messages-container" class="messages-container">
                <!-- 消息将通过 JS 动态添加 -->
            </div>

            <footer class="input-area">
                <div class="input-wrapper">
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                    <button id="upload-btn" class="btn btn-icon" title="上传图片">
                        <span class="material-icons">attach_file</span>
                    </button>
                    <input type="text" id="message-input" placeholder="有什么我可以帮助你的吗？..." class="message-input">
                    <button id="send-btn" class="btn btn-primary" disabled>
                        <span class="material-icons">send</span>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
