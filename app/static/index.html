<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 私人助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-red-50">
    <div class="flex h-screen">
        <!-- 左侧会话列表 -->
        <div class="w-80 bg-white/80 backdrop-blur-sm border-r border-white/50 flex flex-col">
            <!-- 头部 -->
            <div class="p-4 border-b border-gray-100">
                <div class="flex items-center justify-between">
                    <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">AI 私人助手</h1>
                    <button id="new-chat-btn" class="p-2 bg-orange-500 hover:bg-orange-600 text-white rounded-lg transition-colors" title="新建会话">
                        <span class="material-icons text-sm">add</span>
                    </button>
                </div>
            </div>
            
            <!-- 会话列表 -->
            <div id="threads-list" class="flex-1 overflow-y-auto p-2 scrollbar-hide">
                <!-- 会话项将通过 JS 动态添加 -->
            </div>
        </div>

        <!-- 右侧聊天区域 -->
        <div class="flex-1 flex flex-col">
            <!-- 聊天头部 -->
            <div id="chat-header" class="h-16 bg-white/80 backdrop-blur-sm border-b border-white/50 px-6 flex items-center justify-between">
                <div>
                    <h2 id="current-thread-title" class="font-semibold text-gray-800">新对话</h2>
                    <p class="text-sm text-gray-500">开始新的对话</p>
                </div>
                <button id="clear-chat-btn" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="清空会话">
                    <span class="material-icons text-sm">delete</span>
                </button>
            </div>

            <!-- 消息容器 -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-6 scrollbar-hide">
                <!-- 消息将通过 JS 动态添加 -->
            </div>

            <!-- 输入区域 -->
            <div class="p-4 bg-white/80 backdrop-blur-sm border-t border-white/50">
                <div class="max-w-4xl mx-auto flex gap-3">
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                    <button id="upload-btn" class="p-3 text-gray-400 hover:text-blue-500 hover:bg-blue-50 rounded-xl transition-colors" title="上传图片">
                        <span class="material-icons">attach_file</span>
                    </button>
                    <input type="text" id="message-input" placeholder="有什么我可以帮助你的吗？..." class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <button id="send-btn" class="px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <span class="material-icons">send</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentThreadId = null;
        const API_BASE_URL = 'https://web-production-2ad77.up.railway.app/api';

        // DOM 元素
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const threadsList = document.getElementById('threads-list');
        const currentThreadTitle = document.getElementById('current-thread-title');
        const newChatBtn = document.getElementById('new-chat-btn');
        const clearChatBtn = document.getElementById('clear-chat-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');

        // 生成随机会话 ID
        function generateThreadId() {
            return 'thread_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // 保存会话到本地存储
        function saveThread(threadId, title) {
            if (!threadId || !title) return;
            
            let threads = JSON.parse(localStorage.getItem('chat_threads') || '[]');
            const existingIndex = threads.findIndex(t => t.thread_id === threadId);
            
            if (existingIndex >= 0) {
                // 更新现有会话
                threads[existingIndex].title = title;
                threads[existingIndex].updated_at = Date.now();
            } else {
                // 添加新会话
                threads.unshift({
                    thread_id: threadId,
                    title: title,
                    created_at: Date.now(),
                    updated_at: Date.now()
                });
            }
            
            localStorage.setItem('chat_threads', JSON.stringify(threads));
        }

        // 从本地存储获取所有会话
        function getThreads() {
            return JSON.parse(localStorage.getItem('chat_threads') || '[]');
        }

        // 删除会话
        function deleteThreadFromStorage(threadId) {
            let threads = JSON.parse(localStorage.getItem('chat_threads') || '[]');
            threads = threads.filter(t => t.thread_id !== threadId);
            localStorage.setItem('chat_threads', JSON.stringify(threads));
        }

        // 渲染会话列表
        function renderThreads(threads) {
            threadsList.innerHTML = '';
            
            // 添加新对话按钮
            const newThreadItem = document.createElement('div');
            newThreadItem.className = 'p-3 mb-2 bg-orange-50 hover:bg-orange-100 rounded-xl cursor-pointer transition-colors flex items-center gap-3';
            newThreadItem.innerHTML = `
                <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-red-500 rounded-lg flex items-center justify-center">
                    <span class="material-icons text-white text-sm">add</span>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="font-medium text-gray-800 truncate">新对话</p>
                    <p class="text-xs text-gray-500">开始新的会话</p>
                </div>
            `;
            newThreadItem.addEventListener('click', createNewThread);
            threadsList.appendChild(newThreadItem);

            // 添加分割线
            const divider = document.createElement('div');
            divider.className = 'h-px bg-gray-200 my-2';
            threadsList.appendChild(divider);

            // 添加历史会话（只显示有内容的会话）
            threads.forEach(thread => {
                const threadItem = document.createElement('div');
                threadItem.className = `p-3 mb-2 rounded-xl cursor-pointer transition-colors flex items-center gap-3 ${
                    currentThreadId === thread.thread_id 
                        ? 'bg-orange-100 border-2 border-orange-300' 
                        : 'bg-gray-50 hover:bg-gray-100'
                }`;
                threadItem.innerHTML = `
                    <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-orange-500 rounded-lg flex items-center justify-center">
                        <span class="material-icons text-white text-sm">message</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-medium text-gray-800 truncate">${escapeHtml(thread.title)}</p>
                        <p class="text-xs text-gray-500">${formatDate(thread.created_at)}</p>
                    </div>
                    <button class="delete-thread-btn p-1 text-gray-400 hover:text-red-500 transition-colors" data-thread-id="${thread.thread_id}" title="删除会话">
                        <span class="material-icons text-xs">delete</span>
                    </button>
                `;
                threadItem.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('delete-thread-btn')) {
                        switchThread(thread.thread_id, thread.title);
                    }
                });
                threadItem.querySelector('.delete-thread-btn').addEventListener('click', () => {
                    deleteThread(thread.thread_id);
                });
                threadsList.appendChild(threadItem);
            });
        }

        // 加载会话列表
        async function loadThreads() {
            try {
                // 从本地存储获取会话
                const localThreads = getThreads();
                renderThreads(localThreads);
            } catch (error) {
                console.error('加载会话列表失败:', error);
            }
        }

        // 切换会话
        async function switchThread(threadId, title) {
            currentThreadId = threadId;
            currentThreadTitle.textContent = title;
            
            // 加载历史消息
            try {
                const response = await fetch(`${API_BASE_URL}/v1/chat/messages?thread_id=${threadId}`);
                const data = await response.json();
                messagesContainer.innerHTML = '';
                
                // 如果没有历史消息，显示欢迎界面
                if (!data.messages || data.messages.length === 0) {
                    showWelcomeScreen();
                } else {
                    // 显示历史消息
                    data.messages.forEach(msg => {
                        addMessage(msg.role, msg.content, false);
                    });
                }
            } catch (error) {
                console.error('加载历史消息失败:', error);
                showWelcomeScreen();
            }
            
            // 重新渲染会话列表（更新选中状态）
            loadThreads();
        }

        // 删除会话
        async function deleteThread(threadId) {
            if (!confirm('确定要删除这个会话吗？')) return;
            
            try {
                // 从服务器删除
                await fetch(`${API_BASE_URL}/v1/chat/messages?thread_id=${threadId}`, {
                    method: 'DELETE'
                });
                
                // 从本地存储删除
                deleteThreadFromStorage(threadId);
                
                // 如果删除的是当前会话，创建新会话
                if (currentThreadId === threadId) {
                    createNewThread();
                } else {
                    loadThreads();
                }
            } catch (error) {
                console.error('删除会话失败:', error);
            }
        }

        // 显示欢迎界面
        function showWelcomeScreen() {
            messagesContainer.innerHTML = `
                <div class="flex justify-center py-8">
                    <div class="text-center max-w-md">
                        <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center">
                            <span class="material-icons text-white text-3xl">smart_toy</span>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-800 mb-2">你好呀！我是你的 AI 私人助手</h3>
                        <p class="text-gray-600">很高兴为你服务！请问有什么我可以帮助你的吗？</p>
                        <div class="mt-4 text-left bg-blue-50 rounded-xl p-4">
                            <p class="text-sm text-gray-700 mb-2"><span class="font-semibold">💡 我可以帮你解答问题、提供建议</span></p>
                            <p class="text-sm text-gray-600 mb-2"><span class="font-semibold">🔍 搜索最新信息和资讯</span></p>
                            <p class="text-sm text-gray-600 mb-2"><span class="font-semibold">📝 提供创意和灵感</span></p>
                            <p class="text-sm text-gray-600"><span class="font-semibold">💬 陪你聊天交流</span></p>
                        </div>
                    </div>
                </div>
            `;
        }

        // 创建新会话
        function createNewThread() {
            currentThreadId = generateThreadId();
            currentThreadTitle.textContent = '新对话';
            showWelcomeScreen();
            messageInput.value = '';
            sendBtn.disabled = true;
            // 注意：不保存到 localStorage，只有发送消息后才保存
            loadThreads();
        }

        // 添加消息到界面
        function addMessage(role, content, scroll = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex gap-3 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            messageDiv.innerHTML = `
                <div class="w-10 h-10 flex-shrink-0 rounded-xl flex items-center justify-center ${
                    role === 'user' 
                        ? 'bg-gradient-to-br from-blue-500 to-indigo-600' 
                        : 'bg-gradient-to-br from-blue-500 to-indigo-600'
                }">
                    <span class="material-icons text-white text-sm">${
                        role === 'user' ? 'person' : 'smart_toy'
                    }</span>
                </div>
                <div class="max-w-[70%]">
                    <div class="px-4 py-3 rounded-2xl ${
                        role === 'user' 
                            ? 'bg-blue-500 text-white rounded-br-md' 
                            : 'bg-white text-gray-800 rounded-bl-md shadow-sm'
                    }">
                        <p class="whitespace-pre-wrap">${escapeHtml(content)}</p>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            if (scroll) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !currentThreadId) return;

            // 添加用户消息
            addMessage('user', message);
            
            // 清空输入
            messageInput.value = '';
            sendBtn.disabled = true;

            // 创建 AI 回复容器
            const aiMessageContainer = document.createElement('div');
            aiMessageContainer.className = 'flex gap-3';
            aiMessageContainer.innerHTML = `
                <div class="w-10 h-10 flex-shrink-0 rounded-xl flex items-center justify-center bg-gradient-to-br from-blue-500 to-indigo-600">
                    <span class="material-icons text-white text-sm">smart_toy</span>
                </div>
                <div class="max-w-[70%]">
                    <div class="px-4 py-3 rounded-2xl bg-white text-gray-800 rounded-bl-md shadow-sm">
                        <p class="whitespace-pre-wrap ai-response-content"></p>
                        <div class="flex gap-1 mt-2 loading-indicator">
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
                        </div>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(aiMessageContainer);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // 使用 querySelector 获取当前容器内的元素
            const aiResponseElement = aiMessageContainer.querySelector('.ai-response-content');
            const loadingIndicator = aiMessageContainer.querySelector('.loading-indicator');

            try {
                const response = await fetch(`${API_BASE_URL}/v1/chat/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        image_url: '',
                        thread_id: currentThreadId
                    })
                });

                if (!response.ok) {
                    throw new Error('请求失败');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let responseText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    responseText += decoder.decode(value, { stream: true });
                    aiResponseElement.textContent = responseText;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }

                // 移除加载指示器
                loadingIndicator.remove();
                
                // 保存会话到 localStorage（第一次发送消息时）
                const threads = getThreads();
                const existingThread = threads.find(t => t.thread_id === currentThreadId);
                
                if (!existingThread) {
                    // 第一次发送消息，保存会话并更新标题
                    const title = message.length > 30 ? message.substring(0, 30) + '...' : message;
                    currentThreadTitle.textContent = title;
                    saveThread(currentThreadId, title);
                } else {
                    // 更新会话时间
                    saveThread(currentThreadId, currentThreadTitle.textContent);
                }
                
                // 更新会话列表
                loadThreads();
            } catch (error) {
                console.error('发送消息失败:', error);
                aiResponseElement.textContent = '抱歉，发生了错误，请重试。';
                loadingIndicator.remove();
            }
        }

        // 格式化日期
        function formatDate(dateString) {
            if (!dateString) return '刚刚';
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;
            return date.toLocaleDateString('zh-CN');
        }

        // 事件监听
        messageInput.addEventListener('input', () => {
            sendBtn.disabled = !messageInput.value.trim();
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        newChatBtn.addEventListener('click', createNewThread);

        clearChatBtn.addEventListener('click', () => {
            if (currentThreadId && confirm('确定要清空当前会话吗？')) {
                fetch(`${API_BASE_URL}/v1/chat/messages?thread_id=${currentThreadId}`, {
                    method: 'DELETE'
                }).then(() => {
                    createNewThread();
                });
            }
        });

        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                console.log('选择的文件:', file.name);
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 加载会话列表
            loadThreads();
            
            // 检查是否有历史会话
            const threads = getThreads();
            
            if (threads.length > 0) {
                // 加载最新的会话
                const latestThread = threads.reduce((latest, t) => 
                    t.updated_at > latest.updated_at ? t : latest
                );
                switchThread(latestThread.thread_id, latestThread.title);
            } else {
                // 没有历史会话，创建新会话
                createNewThread();
            }
        });
    </script>
</body>
</html>
